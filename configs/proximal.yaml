experiment:
  name: "Proximal Optimizer — f1, 3-valued"
  seed: 42

architecture:
  n_inputs: 6
  hidden_layers: [4, 4]

optimizer:
  method: Proximal
  params:
    lr: 0.01
    lambda_sparse: 0.01
    lambda_attract: 0.05
    prox_threshold: 0.0005

dataset:
  type: truth_table
  formula: f1
  n_values: 3
  n_vars: 6

training:
  tol_mse: 0.002
  max_iter: 5000
  n_trials: 3

logging:
  results_dir: results
  verbose: false
